<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>302教室線上選位與核實系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --border-color: #707070;
            --booked-bg: #e8f4f8;
            --booked-text: #2c3e50;
            --volunteer-bg: #fff2cc;
            --volunteer-text: #d68910;
            --status-match: #d4edda;
            --status-mismatch: #f8d7da;
        }

        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 10px;
            color: #000;
        }

        /* 導覽列 */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            background: #2c3e50;
            padding: 10px;
            margin: -10px -10px 15px -10px;
        }
        .nav-bar span { color: white; font-weight: bold; font-size: 15px; line-height: 30px; padding-left: 5px; }
        .nav-btn {
            background: #34495e;
            color: white;
            border: 1px solid #455a64;
            padding: 5px 15px;
            cursor: pointer;
            font-size: 13px;
            border-radius: 4px;
        }

        /* 跨頁面切換控制 */
        .page { display: none; }
        .page.active { display: block; }

        .main-container {
            max-width: 100%;
            margin: 0 auto;
            background: #fff;
            padding: 10px;
            box-sizing: border-box;
        }

        /* 頂部班期標題 */
        .class-info-header {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
            word-break: break-all;
            color: #111;
        }

        /* 講台與白板相對位置 */
        .stage-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 10px 0 25px 0;
        }
        .stage-box {
            border: 1px solid var(--border-color);
            padding: 6px 25px;
            font-size: 13px;
            font-weight: bold;
            background: #f2f2f2;
        }

        /* 教室主網格佈局 */
        .classroom-grid {
            display: flex;
            justify-content: center;
            align-items: stretch;
            overflow-x: auto;
            padding-bottom: 15px;
        }

        /* 左右門位最簡化標示 */
        .door-notice-left, .door-notice-right {
            width: 45px;
            font-size: 13px;
            font-weight: bold;
            color: #ff0000;
            display: flex;
            flex-direction: column;
            text-align: center;
            box-sizing: border-box;
            padding-top: 2px;
        }
        .door-notice-left { justify-content: flex-start; } 
        .door-notice-right { justify-content: space-between; } 

        /* 座位表格基本樣式（10欄連貫無空隙） */
        .seat-table {
            border-collapse: separate;
            border-spacing: 4px 5px;
            margin: 0 10px;
            min-width: 600px;
        }
        .seat-table td {
            border: 1px solid var(--border-color);
            text-align: center;
            vertical-align: middle;
            width: 60px;
            height: 40px;
            font-size: 13px;
            font-weight: bold;
            background-color: #fff;
            cursor: pointer;
            border-radius: 2px;
        }
        .seat-table td.booked {
            background-color: var(--booked-bg);
            color: var(--booked-text);
        }
        .seat-table td.verified-match {
            background-color: var(--status-match) !important;
            color: #155724 !important;
            border-color: #c3e6cb;
        }
        .seat-table td.verified-error {
            background-color: var(--status-mismatch) !important;
            color: #721c24 !important;
            border-color: #f5c6cb;
        }
        .seat-table td.volunteer-seat {
            background-color: var(--volunteer-bg);
            color: var(--volunteer-text);
            border: 1px solid var(--volunteer-text);
            font-size: 12px;
        }

        .scroll-hint { text-align: center; font-size: 11px; color: #7f8c8d; margin-bottom: 5px; }
        @media (min-width: 768px) { .scroll-hint { display: none; } }

        /* 彈出視窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-body {
            background: #fff;
            padding: 20px;
            border-radius: 6px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .modal-body input {
            width: 90%; padding: 8px; margin: 12px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; text-align: center;
        }
        .modal-btns { display: flex; justify-content: space-around; margin-top: 10px; gap: 8px; }
        .btn { padding: 6px 14px; border: 1px solid #707070; background: #f2f2f2; cursor: pointer; font-size: 14px; border-radius: 4px; }
        .btn-ok { background: #d4edda; color: #155724; border-color: #c3e6cb; font-weight: bold; }
        .btn-clear { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }

        /* 提示文字樣式 */
        .modal-notice-box {
            background: #fff9f9;
            border: 1px solid #ffcccc;
            border-radius: 4px;
            padding: 8px 10px;
            margin: 10px 0;
            text-align: left;
            font-size: 12px;
            color: #cc0000;
            line-height: 1.4;
            font-weight: bold;
        }

        /* 後台控制板主結構 */
        .admin-box {
            background: white; padding: 15px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .admin-box h3 { margin-top: 0; color: #2c3e50; border-left: 4px solid #2980b9; padding-left: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .form-group textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; resize: vertical; }
        .form-group input[type="password"], .form-group input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        .btn-admin-act { width: 100%; padding: 12px; font-size: 14px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; color: white; margin-bottom: 10px; }
        .btn-blue { background-color: #2980b9; }
        .btn-orange { background-color: #e67e22; }
        .btn-gray { background-color: #7f8c8d; }
        .btn-green { background-color: #27ae60; }
        .btn-red { background-color: #c0392b; }
        .btn-purple { background-color: #8e44ad; } /* 存檔按鈕顏色 */
        
        .report-box { background: #fdfefe; border: 1px solid #ddd; padding: 12px; border-radius: 4px; font-size: 13px; margin-top: 15px; line-height: 1.5; display: none; }
        
        .qrcode-container {
            background: #fff;
            border: 1px solid #ccc;
            padding: 15px;
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }
        .qrcode-url-text {
            font-size: 12px;
            color: #555;
            word-break: break-all;
            margin-top: 10px;
            background: #eee;
            padding: 5px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        /* 後台人工覆蓋/刪除座位區 */
        .admin-modification-box {
            background: #f4f6f7;
            border: 1px solid #d5dbdb;
            padding: 12px;
            border-radius: 5px;
            margin-top: 15px;
        }

        .pwd-section {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
        }

        /* 🖨️ 專門控制列印/存檔 PDF 時的隱藏規則（確保存檔最乾淨、檔案最小） */
        @media print {
            body { background-color: #fff; padding: 0; margin: 0; }
            .nav-bar, #adminPage, .scroll-hint, .modal-overlay { display: none !important; }
            #studentPage { display: block !important; }
            .main-container { box-shadow: none; padding: 0; margin: 0; }
            .seat-table td { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <span>公務人力發展中心選位系統</span>
        <button class="nav-btn" id="navToggleBtn" onclick="openLoginModal()">切換至管理後台</button>
    </div>

    <div id="studentPage" class="page active">
        <div class="main-container">
            <div class="class-info-header" id="displayClassHeader">
                302教室線上選位表 (請由管理員自後台載入班期名冊)
            </div>
            <div class="scroll-hint">⇿ 手機用戶可左右滑動查看完整 302 教室 ⇿</div>

            <div class="stage-area">
                <div class="stage-box">白板</div>
                <div class="stage-box">講台</div>
                <div class="stage-box">白板</div>
            </div>

            <div class="classroom-grid">
                <div class="door-notice-left">
                    <div>前門</div>
                </div>

                <table class="seat-table" id="classroomSeats">
                </table>

                <div class="door-notice-right">
                    <div>前門</div>
                    <div>後門</div>
                </div>
            </div>
        </div>
    </div>

    <div id="adminPage" class="page">
        <div class="admin-box">
            <h3>⚙️ 302教室 - 系統管理後台</h3>
            
            <div class="form-group">
                <label>【步驟一】請複製 Word 名冊內的「所有文字」並貼在下方：</label>
                <textarea id="rawRosterInput" rows="5" placeholder="請在 Word 檔案中按 Ctrl+A 全選、Ctrl+C 複製，然後直接在此貼上..."></textarea>
            </div>

            <button class="btn-admin-act btn-blue" onclick="processRosterText()">【步驟二】一鍵解析並啟動班期</button>
            
            <div id="qrcodeWrapper" class="qrcode-container" style="display: none;">
                <strong style="color: #2c3e50; margin-bottom: 10px; font-size:14px;">📱 當前班期專屬 QR Code (供現場學員手機掃描)</strong>
                <div id="qrcode"></div>
                <div class="qrcode-url-text" id="qrcodeUrl"></div>
            </div>

            <button class="btn-admin-act btn-orange" onclick="verifyFilledSeats()">【步驟三】一鍵與名冊核實比對</button>
            <button class="btn-admin-act btn-gray" onclick="clearVerificationStatus()">清除核實燈號</button>
            
            <button class="btn-admin-act btn-purple" onclick="exportCurrentClassSeats()">🖨️ 匯出當前座位表（存檔）</button>

            <div class="report-box" id="adminReport"></div>

            <div class="admin-modification-box">
                <h4 style="margin: 0 0 10px 0; color: #2c3e50;">✍️ 管理員人工座位修正面板 (解決學員填錯問題)</h4>
                <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                    <div style="flex: 1;">
                        <label style="font-size: 12px; font-weight: bold;">座位編號 (例: 1-1)</label>
                        <input type="text" id="modSeatId" placeholder="排-欄">
                    </div>
                    <div style="flex: 2;">
                        <label style="font-size: 12px; font-weight: bold;">正確學員姓名</label>
                        <input type="text" id="modStudentName" placeholder="輸入姓名 (清除座位時免填)">
                    </div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-admin-act btn-green" style="margin-bottom:0; padding: 8px; font-size:13px;" onclick="adminForceAssignSeat()">強制更新/寫入該位子</button>
                    <button class="btn-admin-act btn-red" style="margin-bottom:0; padding: 8px; font-size:13px;" onclick="adminForceClearSeat()">清除此座位登記</button>
                </div>
            </div>

            <div class="pwd-section">
                <h4 style="margin: 0 0 10px 0; color: #7f8c8d;">🔒 後台安全性設定</h4>
                <div class="form-group" style="margin-bottom: 8px;">
                    <label style="font-size: 12px; color:#555;">設定新的管理員密碼：</label>
                    <input type="password" id="newPasswordInput" placeholder="請輸入新密碼">
                </div>
                <button class="btn-admin-act btn-green" style="padding: 8px; font-size: 13px;" onclick="changeAdminPassword()">變更管理員密碼</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="loginModal">
        <div class="modal-body">
            <h3 style="margin: 0 0 10px 0;">管理者登入</h3>
            <p style="font-size: 13px; color: #666; margin: 0;">請輸入後台密碼 (預設為 302)：</p>
            <input type="password" id="adminPasswordInput" placeholder="請輸入密碼">
            <div class="modal-btns">
                <button class="btn" onclick="closeLoginModal()">取消</button>
                <button class="btn btn-ok" onclick="submitLogin()">確認登入</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="seatModal">
        <div class="modal-body">
            <h3 id="targetSeatLabel" style="margin: 0;">座位 1-1</h3>
            
            <div class="modal-notice-box">
                1. 填好的座位表放在志工的座位區，換座位記得改。<br>
                2. 每節開始上課後10分鐘點名，超過15分鐘未到者須請假1小時。
            </div>

            <p style="font-size: 12px; color: #666; margin: 8px 0 0 0;" id="inputLabelText">請填寫您的真實姓名：</p>
            <input type="text" id="studentName" placeholder="請輸入姓名" autocomplete="off">
            <div class="modal-btns">
                <button class="btn" onclick="closeSelectModal()">關閉視窗</button>
                <button class="btn btn-clear" id="btnCancelSeat" onclick="clearCurrentSeat()">取消原先座位</button>
                <button class="btn btn-ok" id="btnSubmitSeat" onclick="saveStudentSeat()">確認提交</button>
            </div>
        </div>
    </div>

<script>
    let currentPage = "student"; 
    let activeSeatId = "";      
    let isVerifyVisualOn = false; 

    let adminPassword = localStorage.getItem("seat_admin_pwd") || "302"; 
    let currentClassID = getUrlParam("class") || ""; 

    let dbTitles = JSON.parse(localStorage.getItem("seat_db_titles")) || {};
    let dbRosters = JSON.parse(localStorage.getItem("seat_db_rosters")) || {};
    let dbFilledData = JSON.parse(localStorage.getItem("seat_db_filled")) || {};

    let classHeaderTitle = dbTitles[currentClassID] || "302教室線上選位表 (請由管理員自後台載入班期名冊)";
    if (currentClassID === "") classHeaderTitle = "302教室線上選位表 (請由管理員自後台載入班期名冊)";
    let officialRoster = dbRosters[currentClassID] || [];
    let studentFilledData = dbFilledData[currentClassID] || {};

    function getUrlParam(name) {
        return new URLSearchParams(window.location.search).get(name);
    }

    function openLoginModal() {
        const btn = document.getElementById("navToggleBtn");
        if (currentPage === "student") {
            document.getElementById("adminPasswordInput").value = "";
            document.getElementById("loginModal").style.display = "flex";
            document.getElementById("adminPasswordInput").focus();
        } else {
            document.getElementById("adminPage").classList.remove("active");
            document.getElementById("studentPage").classList.add("active");
            btn.innerText = "切換至管理後台";
            currentPage = "student";
        }
    }

    function closeLoginModal() { document.getElementById("loginModal").style.display = "none"; }

    function submitLogin() {
        if (document.getElementById("adminPasswordInput").value === adminPassword) {
            closeLoginModal();
            document.getElementById("studentPage").classList.remove("active");
            document.getElementById("adminPage").classList.add("active");
            document.getElementById("navToggleBtn").innerText = "返回學員選位前台";
            currentPage = "admin";
            if (currentClassID) generateClassQRCode(currentClassID);
        } else {
            alert("密碼錯誤！進入失敗。");
        }
    }

    function changeAdminPassword() {
        const newPwd = document.getElementById("newPasswordInput").value.trim();
        if (!newPwd) { alert("密碼不可為空！"); return; }
        if (confirm(`確定要將密碼修改為「${newPwd}」嗎？`)) {
            adminPassword = newPwd;
            localStorage.setItem("seat_admin_pwd", newPwd);
            document.getElementById("newPasswordInput").value = "";
            alert("密碼修改成功！");
        }
    }

    function renderSeatsGrid() {
        document.getElementById("displayClassHeader").innerText = classHeaderTitle;
        const table = document.getElementById("classroomSeats");
        let html = "";

        for (let row = 1; row <= 12; row++) {
            html += "<tr>";
            for (let col = 1; col <= 10; col++) {
                if (row === 12 && (col === 9 || col === 10)) {
                    html += `<td class="volunteer-seat">志工</td>`;
                    continue;
                }

                const seatCode = `${row}-${col}`;
                const name = studentFilledData[seatCode];

                if (name) {
                    let tdClass = "booked";
                    if (isVerifyVisualOn) {
                        tdClass = officialRoster.includes(name) ? "verified-match" : "verified-error";
                    }
                    html += `<td class="${tdClass}" onclick="handleSeatClick('${seatCode}')">${name}</td>`;
                } else {
                    html += `<td onclick="handleSeatClick('${seatCode}')">${seatCode}</td>`;
                }
            }
            html += "</tr>";
        }
        table.innerHTML = html;
    }

    function processRosterText() {
        const text = document.getElementById("rawRosterInput").value;
        if (!text.trim()) { alert("請先貼入名冊文字內容！"); return; }

        try {
            let classCode = "000000";
            let className = "新研習班期";
            const codeMatch = text.match(/(\d{6})[「"']?([^「」"'\s]+)[開班]?[」"']?/);
            if (codeMatch) {
                classCode = codeMatch[1];
                className = `「${codeMatch[2]}」`;
            }

            let formattedDate = "";
            const dateMatch = text.match(/受訓日期：(\d+)年(\d+)月(\d+)日/);
            if (dateMatch) {
                const westernYear = parseInt(dateMatch[1]) + 1911;
                formattedDate = `${westernYear}.${dateMatch[2].padStart(2,'0')}.${dateMatch[3].padStart(2,'0')}`;
            } else {
                const today = new Date();
                formattedDate = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
            }

            currentClassID = classCode;
            classHeaderTitle = `${classCode}${className}-${formattedDate}`;

            const cleanText = text.replace(/高雄市政府公務人力發展中心/g, " ")
                                  .replace(/主任|秘書|組長|副研究員|輔導員|組員|助理員|技士|辦事員|駐衛隊員|技工|駕駛|工友/g, " ");
            const tokens = cleanText.split(/[\s\t\n\r ]+/);
            const excludeWords = ["座號", "機關學校", "職稱", "姓名", "受訓日期", "至", "共", "小時", "學員名冊", "班期"];
            const nameSet = new Set();
            const nameRegex = /^[\u4e00-\u9fa5]{2,4}$/;

            tokens.forEach(token => {
                const clean = token.trim();
                if (nameRegex.test(clean) && !excludeWords.includes(clean) && !clean.includes("年") && !clean.includes("月") && !clean.includes("日")) {
                    nameSet.add(clean);
                }
            });
            officialRoster = Array.from(nameSet);

            if (!dbFilledData[currentClassID]) studentFilledData = {};
            else studentFilledData = dbFilledData[currentClassID];

            dbTitles[currentClassID] = classHeaderTitle;
            dbRosters[currentClassID] = officialRoster;
            dbFilledData[currentClassID] = studentFilledData;
            localStorage.setItem("seat_db_titles", JSON.stringify(dbTitles));
            localStorage.setItem("seat_db_rosters", JSON.stringify(dbRosters));
            localStorage.setItem("seat_db_filled", JSON.stringify(dbFilledData));

            const baseUrl = window.location.protocol + '//' + window.location.host + window.location.pathname;
            alert(`【開班成功】\n班期 ${currentClassID} 已完成解析與建立。\n系統將自動重導向並更新專屬頁面！`);
            window.location.href = `${baseUrl}?class=${currentClassID}`;

        } catch (err) {
            alert("解析錯誤，請確認文字內包含完整的名冊結構。");
        }
    }

    function generateClassQRCode(classId) {
        const baseUrl = window.location.protocol + '//' + window.location.host + window.location.pathname;
        const targetClassUrl = `${baseUrl}?class=${classId}`;

        document.getElementById("qrcodeWrapper").style.display = "flex";
        document.getElementById("qrcodeUrl").innerText = targetClassUrl;
        document.getElementById("qrcode").innerHTML = "";

        new QRCode(document.getElementById("qrcode"), {
            text: targetClassUrl,
            width: 160,
            height: 160,
            colorDark : "#2c3e50",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    function handleSeatClick(seatCode) {
        if (!currentClassID) {
            alert("目前尚未由後台載入班期。請先由管理員至後台貼入名冊開班！");
            return;
        }
        activeSeatId = seatCode;
        
        const updatedDbFilled = JSON.parse(localStorage.getItem("seat_db_filled")) || {};
        studentFilledData = updatedDbFilled[currentClassID] || {};
        const existingName = studentFilledData[seatCode] || "";
        
        document.getElementById("targetSeatLabel").innerText = `座位 ${seatCode}`;
        document.getElementById("studentName").value = existingName;
        
        if (existingName) {
            document.getElementById("btnCancelSeat").style.display = "inline-block";
            document.getElementById("inputLabelText").innerText = "目前登記學員：";
            document.getElementById("studentName").disabled = true; 
            document.getElementById("btnSubmitSeat").style.display = "none"; 
        } else {
            document.getElementById("btnCancelSeat").style.display = "none";
            document.getElementById("inputLabelText").innerText = "請填寫您的真實姓名：";
            document.getElementById("studentName").disabled = false;
            document.getElementById("btnSubmitSeat").style.display = "inline-block";
        }
        document.getElementById("seatModal").style.display = "flex";
    }

    function closeSelectModal() { document.getElementById("seatModal").style.display = "none"; }

    function clearCurrentSeat() {
        if (confirm(`確定要取消座位 ${activeSeatId} 的登記嗎？`)) {
            delete studentFilledData[activeSeatId];
            dbFilledData[currentClassID] = studentFilledData;
            localStorage.setItem("seat_db_filled", JSON.stringify(dbFilledData));
            renderSeatsGrid();
            closeSelectModal();
            alert(`座位 ${activeSeatId} 已成功釋放。`);
        }
    }

    function saveStudentSeat() {
        const name = document.getElementById("studentName").value.trim();
        if (!name) { alert("請輸入姓名！"); return; }

        const doubleCheckDb = JSON.parse(localStorage.getItem("seat_db_filled")) || {};
        const latestClassData = doubleCheckDb[currentClassID] || {};
        
        if (latestClassData[activeSeatId]) {
            alert(`【位置已被搶先登記】\n這個座位剛剛已被「${latestClassData[activeSeatId]}」登記了！請重選空位。`);
            studentFilledData = latestClassData;
            renderSeatsGrid();
            closeSelectModal();
            return;
        }

        if (Object.entries(latestClassData).some(([id, n]) => n === name)) {
            alert(`【禁止重複選位】\n「${name}」您目前已登記過其他座位囉！\n每人限選一位。如欲換位，請先回到原本登記的座位點選「取消原先座位」，釋放後才能改填新空位。`);
            return;
        }

        studentFilledData[activeSeatId] = name;
        dbFilledData[currentClassID] = studentFilledData;
        localStorage.setItem("seat_db_filled", JSON.stringify(dbFilledData));
        
        renderSeatsGrid();
        closeSelectModal();
    }

    function adminForceAssignSeat() {
        if (!currentClassID) { alert("請先啟動班期！"); return; }
        const seatId = document.getElementById("modSeatId").value.trim();
        const studentName = document.getElementById("modStudentName").value.trim();

        if (!seatId || !studentName) { alert("請輸入座位編號與學員姓名！"); return; }
        if (!/^([1-9]|1[0-2])-([1-9]|10)$/.test(seatId)) { alert("座位格式錯誤 (1-1 到 12-10)！"); return; }
        if (seatId === "12-9" || seatId === "12-10") { alert("不可指派志工座。"); return; }

        studentFilledData[seatId] = studentName;
        dbFilledData[currentClassID] = studentFilledData;
        localStorage.setItem("seat_db_filled", JSON.stringify(dbFilledData));

        renderSeatsGrid();
        document.getElementById("modSeatId").value = "";
        document.getElementById("modStudentName").value = "";
        alert(`【後台手動變更】座位 ${seatId} 已寫入為「${studentName}」。`);
    }

    function adminForceClearSeat() {
        if (!currentClassID) { alert("請先啟動班期！"); return; }
        const seatId = document.getElementById("modSeatId").value.trim();
        if (!seatId) { alert("請輸入座位編號！"); return; }
        if (!studentFilledData[seatId]) { alert("該位子目前本來就是空位。"); return; }

        if (confirm(`確定要強制清除座位 ${seatId} 的「${studentFilledData[seatId]}」嗎？`)) {
            delete studentFilledData[seatId];
            dbFilledData[currentClassID] = studentFilledData;
            localStorage.setItem("seat_db_filled", JSON.stringify(dbFilledData));

            renderSeatsGrid();
            document.getElementById("modSeatId").value = "";
            alert(`【後台手動變更】座位 ${seatId} 已強制清空。`);
        }
    }

    function verifyFilledSeats() {
        if (!currentClassID || officialRoster.length === 0) { alert("請先貼入名冊建立班期！"); return; }
        isVerifyVisualOn = true;
        renderSeatsGrid(); 

        const filledNames = Object.values(studentFilledData);
        let matchCount = 0;
        let errorNames = [];

        filledNames.forEach(name => {
            if (officialRoster.includes(name)) matchCount++;
            else errorNames.push(name);
        });

        const missingStudents = officialRoster.filter(name => !filledNames.includes(name));
        const report = document.getElementById("adminReport");
        report.style.display = "block";
        report.innerHTML = `
            <strong>📊 班期 [${currentClassID}] 即時核實對比報告：</strong><br>
            • 官方應到人數：${officialRoster.length} 人<br>
            • 現場已填座位：${filledNames.length} 人<br>
            • <span style="color:green; font-weight:bold;">符合官方名冊：${matchCount} 人 (格變綠色)</span><br>
            • <span style="color:red; font-weight:bold;">名字不符/查無此人：${errorNames.length} 人 (格變紅色) ${errorNames.length > 0 ? `[${errorNames.join('、')}]` : ''}</span><br>
            • <span>應到未選位學員：${missingStudents.length} 人 [${missingStudents.length > 0 ? missingStudents.join('、') : '無'}]</span>
        `;
        alert(`班期 ${currentClassID} 核實比對燈號標記完成。`);
    }

    function clearVerificationStatus() {
        isVerifyVisualOn = false;
        document.getElementById("adminReport").style.display = "none";
        renderSeatsGrid();
    }

    // 🖨️ 新增：調用系統免外掛、極簡存檔模組
    function exportCurrentClassSeats() {
        if (!currentClassID) {
            alert("目前沒有任何班期座位資料可供存檔。");
            return;
        }
        // 直接調用系統列印，內建的樣式表會自動隱藏後台跟按鈕，只留乾淨的302大表格
        window.print();
    }

    window.onload = function() { renderSeatsGrid(); };
</script>
</body>
</html>
